name: CD - Production Deployment

on:
  push:
    branches: [main]

jobs:
  migrate-and-deploy:
    name: Run Migrations and Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pending Drizzle migrations against production Neon DB
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy backend container to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}

  # NOTE: Frontend deployment (Vercel) and Neon database branching for PR
  # preview environments (planning doc, Section 8 Phase 2) live in the
  # separate frontend repo's own workflow, since this repo is backend-only.
